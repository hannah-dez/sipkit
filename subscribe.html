<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Subscribe</title>
</head>
<body>
    <header>
        <h1><a href="index.html">SipKit</a></h1>
        <nav>
            <ul>
                <li><a href="sipkits.html">SipKits</a></li>
                <li><a href="subscribe.html">Subscribe</a></li>
                <li><a href="#">Plan an Event</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="subscribe-header">
            <h2>Subscribe to Our Newsletter</h2>
            <p>Hear about all of our new product drops and seasonal SipKits!</p>
        </div>
        <form name="subscribe" method="POST" data-netlify="true" id="subscribe-form" novalidate>
            <input type="hidden" name="form-name" value="subscribe" />
            
            <div class="form-group">
                <label for="first-name">First Name*</label>
                <input type="text" name="first-name" id="first-name" required />
                <span class="error-msg">Please enter your first name</span>
            </div>

            <div class="form-group">
                <label for="last-name">Last Name*</label>
                <input type="text" name="last-name" id="last-name" required />
                <span class="error-msg">Please enter your last name</span>
            </div>

            <div class="form-group">
                <label for="email">Email*</label>
                <input type="email" name="email" id="email" required />
                <span class="error-msg">Please enter a valid email</span>
            </div>

            <div class="form-group">
                <label for="comment">Comment</label>
                <textarea name="comment" id="comment" rows="5" placeholder="Leave a comment..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Subscribe</button>
        </form>
    </main>
    <footer>
        <nav class="footer-nav">
            <ul>
                <li><a href="">Terms & Conditions</a></li>
                <li><a href="">Contact</a></li>
                <li><a href="">Instagram</a></li>
                <li><a href="">LinkedIn</a></li>
            </ul>
        </nav>
    </footer>
<script>
    const form = document.getElementById('subscribe-form');

    const requiredFields = form.querySelectorAll('input[required], textarea[required]');

    requiredFields.forEach(field => {
        const errorMsg = field.nextElementSibling;

        // Check when user clicks out of a field
        field.addEventListener('blur', function() {
            if (!field.value.trim() || (field.type === 'email' && !field.value.includes('@'))) {
                field.classList.add('invalid');
                errorMsg.classList.add('visible');
            } else {
                field.classList.remove('invalid');
                errorMsg.classList.remove('visible');
            }
        });

        // Clear error as user starts typing
        field.addEventListener('input', function() {
            if (field.value.trim()) {
                field.classList.remove('invalid');
                errorMsg.classList.remove('visible');
            }
        });
    });

    // Still validate all on submit in case user skips fields entirely
    form.addEventListener('submit', function(e) {
        let valid = true;
        requiredFields.forEach(field => {
            const errorMsg = field.nextElementSibling;
            if (!field.value.trim() || (field.type === 'email' && !field.value.includes('@'))) {
                field.classList.add('invalid');
                errorMsg.classList.add('visible');
                valid = false;
            }
        });
        if (!valid) e.preventDefault();
    });
</script>
</body>
</html>
